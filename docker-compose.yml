# Quick local/demo deploy of the NetAlign API with a persistent SQLite volume.
#
#   docker compose up --build
#   curl http://localhost:5000/api/health
#
# Point a Vite frontend (bun run dev) at this API via proxy, or set CORS_ORIGINS
# and VITE_API_BASE for a split deploy.

services:
  api:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      NETALIGN_DB_PATH: /data/netalign.db
      # Browser origins allowed to call the API (adjust for your frontend host)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      LOG_REQUESTS: ${LOG_REQUESTS:-1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - netalign-data:/data
    restart: unless-stopped

volumes:
  netalign-data:
